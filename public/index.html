<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Super Pico Park - 10 Tầng Địa Ngục</title>
    <style>
        body { margin: 0; background: #87CEEB; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #uiLayer { position: absolute; top: 10px; left: 20px; color: #333; pointer-events: none; }
        h1 { margin: 0; color: #fff; font-size: 32px; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000; }
        .hud { font-weight: bold; font-size: 18px; color: #fff; text-shadow: 1px 1px 2px #000; margin-top: 5px; }
        .oxygen-bar { width: 150px; height: 18px; background: #333; border: 2px solid #fff; border-radius: 4px; display: inline-block; vertical-align: middle; margin-left: 10px; }
        .oxygen-fill { width: 100%; height: 100%; background: #00a8ff; transition: width 0.1s; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="uiLayer">
        <h1 id="mapTitle">SUPER PICO PARK - MAP 1</h1>
        <div class="hud">CƠ CHẾ MỚI: 🌌 Vùng Không Trọng Lực - Ấn Nhảy (W/Space) để bay lượn tự do!</div>
        <div class="hud">OXY DƯỚI NƯỚC: <div class="oxygen-bar"><div id="oxyFill" class="oxygen-fill"></div></div></div>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        const gravity = 0.6;
        let localId = null;
        let localPlayer = { x: 50, y: 100, vx: 0, vy: 0, width: 32, height: 40, ground: false, facing: 'right', oxygen: 100, portalCooldown: 0 };
        let otherPlayers = {};
        let gameState = { platforms: [], spikes: [], lava: [], water: [], wind: [], enemies: [], sawblades: [], portals: [], zeroGravity: [], key: {}, door: {}, gameFinished: false };
        
        let cameraX = 0; let cameraY = 0;
        const MAP_WIDTH = 3000;
        let lastEmitTime = 0; // Giới hạn băng thông gửi gói tin mạng

        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        socket.on('initId', id => { localId = id; });

        socket.on('currentPlayers', (sp) => {
            // Loại bỏ những người chơi không còn tồn tại trên server để xóa nhân bản ma
            Object.keys(otherPlayers).forEach(id => { if (!sp[id]) delete otherPlayers[id]; });
            
            Object.keys(sp).forEach((id) => {
                if (id === localId || id === socket.id) {
                    localPlayer.color = sp[id].color;
                } else { 
                    if (!otherPlayers[id]) {
                        otherPlayers[id] = { ...sp[id], targetX: sp[id].x, targetY: sp[id].y };
                    } else {
                        otherPlayers[id].targetX = sp[id].x;
                        otherPlayers[id].targetY = sp[id].y;
                        otherPlayers[id].facing = sp[id].facing;
                    }
                }
            });
        });

        socket.on('playerMoved', p => { 
            if(p.id !== socket.id && p.id !== localId) {
                if (!otherPlayers[p.id]) {
                    otherPlayers[p.id] = { ...p, targetX: p.x, targetY: p.y };
                } else {
                    otherPlayers[p.id].targetX = p.x;
                    otherPlayers[p.id].targetY = p.y;
                    otherPlayers[p.id].facing = p.facing;
                }
            }
        });

        socket.on('playerDisconnected', id => delete otherPlayers[id]);
        
        socket.on('gameState', s => { 
            gameState = s; 
            otherPlayers = {}; // XÓA SẠCH BÓNG MA KHI CHUYỂN MÀN CHƠI MỚI
            document.getElementById('mapTitle').innerText = `SUPER PICO PARK - MAP ${gameState.levelIndex + 1}`; 
            if (s.spawn) { localPlayer.x = s.spawn.x; localPlayer.y = s.spawn.y; }
            localPlayer.vx = 0; localPlayer.vy = 0;
        });
        
        socket.on('updateDynamicObjects', d => { 
            if(d.enemies) gameState.enemies = d.enemies; 
            if(d.sawblades) gameState.sawblades = d.sawblades;
        });

        function checkAABB(a, b) {
            return a.x < b.x + b.width && a.x + a.width > b.x && a.y < b.y + b.height && a.y + a.height > b.y;
        }

        function update() {
            if (gameState.gameFinished) return;

            // NỘI SUY MƯỢT MÀ VỊ TRÍ CỦA ĐỒNG ĐỘI (CHỐNG GIẬT LAG HÌNH ẢNH)
            Object.keys(otherPlayers).forEach(id => {
                let other = otherPlayers[id];
                if (other.targetX !== undefined) {
                    other.x += (other.targetX - other.x) * 0.25;
                    other.y += (other.targetY - other.y) * 0.25;
                }
            });

            if (localPlayer.portalCooldown > 0) localPlayer.portalCooldown--;

            let inWater = false;
            gameState.water.forEach(w => { if (checkAABB(localPlayer, w)) inWater = true; });

            // KIỂM TRA VÙNG KHÔNG TRỌNG LỰC 🌌
            let inZeroG = false;
            if (gameState.zeroGravity) {
                gameState.zeroGravity.forEach(zg => { if (checkAABB(localPlayer, zg)) inZeroG = true; });
            }

            gameState.wind.forEach(w => {
                if (checkAABB(localPlayer, w)) {
                    if (w.forceX) localPlayer.vx += w.forceX * 0.1;
                    if (w.forceY) localPlayer.vy += w.forceY * 0.1;
                }
            });

            // TƯƠNG TÁC CỔNG DỊCH CHUYỂN
            gameState.portals.forEach(p => {
                let portal1 = { x: p.x1, y: p.y1, width: 40, height: 60 };
                if (checkAABB(localPlayer, portal1) && localPlayer.portalCooldown === 0) {
                    localPlayer.x = p.x2; localPlayer.y = p.y2;
                    localPlayer.portalCooldown = 100;
                }
            });

            let currentBlockType = 'normal';
            let floorCheckRect = { x: localPlayer.x + 2, y: localPlayer.y + localPlayer.height, width: localPlayer.width - 4, height: 2 };
            gameState.platforms.forEach(plat => {
                if (checkAABB(floorCheckRect, plat)) currentBlockType = plat.type || 'normal';
            });

            let moveSpeed = 5; let acc = 0.6;
            if (currentBlockType === 'honey') moveSpeed = 1.5;

            if (currentBlockType === 'conveyorRight') localPlayer.x += 3;
            if (currentBlockType === 'conveyorLeft') localPlayer.x -= 3;

            if (inWater) {
                if (keys['ArrowLeft'] || keys['KeyA']) localPlayer.vx = -3;
                else if (keys['ArrowRight'] || keys['KeyD']) localPlayer.vx = 3;
                else localPlayer.vx *= 0.8;
                if (keys['ArrowUp'] || keys['KeyW'] || keys['Space']) localPlayer.vy = -4; else localPlayer.vy = Math.min(localPlayer.vy + 0.1, 2);
                
                localPlayer.oxygen = Math.max(localPlayer.oxygen - 0.2, 0);
                if (localPlayer.oxygen <= 0) socket.emit('teamDied');
            } else if (inZeroG) {
                // DI CHUYỂN TRONG MÔI TRƯỜNG KHÔNG TRỌNG LỰC
                if (keys['ArrowLeft'] || keys['KeyA']) { localPlayer.vx = -4; localPlayer.facing = 'left'; }
                else if (keys['ArrowRight'] || keys['KeyD']) { localPlayer.vx = 4; localPlayer.facing = 'right'; }
                else localPlayer.vx *= 0.8;

                if (keys['ArrowUp'] || keys['KeyW'] || keys['Space']) localPlayer.vy = -4;
                else if (keys['ArrowDown'] || keys['KeyS']) localPlayer.vy = 4;
                else localPlayer.vy *= 0.8;
                
                localPlayer.ground = false;
            } else {
                localPlayer.oxygen = Math.min(localPlayer.oxygen + 1.5, 100);

                if (keys['ArrowLeft'] || keys['KeyA']) {
                    if (currentBlockType === 'ice') localPlayer.vx = Math.max(localPlayer.vx - acc, -moveSpeed);
                    else localPlayer.vx = -moveSpeed;
                    localPlayer.facing = 'left';
                } else if (keys['ArrowRight'] || keys['KeyD']) {
                    if (currentBlockType === 'ice') localPlayer.vx = Math.min(localPlayer.vx + acc, moveSpeed);
                    else localPlayer.vx = moveSpeed;
                    localPlayer.facing = 'right';
                } else {
                    if (currentBlockType === 'ice') localPlayer.vx *= 0.98;
                    else localPlayer.vx *= 0.7; 
                }

                if ((keys['ArrowUp'] || keys['KeyW'] || keys['Space']) && localPlayer.ground && currentBlockType !== 'honey') {
                    if (currentBlockType === 'bounce') localPlayer.vy = -18; 
                    else localPlayer.vy = -12; 
                    localPlayer.ground = false;
                }
                localPlayer.vy += gravity;
            }

            document.getElementById('oxyFill').style.width = `${localPlayer.oxygen}%`;

            // === VẬT LÝ TRỤC X ===
            localPlayer.x += localPlayer.vx;
            if (localPlayer.x < 0) localPlayer.x = 0;
            if (localPlayer.x + localPlayer.width > MAP_WIDTH) localPlayer.x = MAP_WIDTH - localPlayer.width;

            gameState.platforms.forEach(plat => {
                if (checkAABB(localPlayer, plat)) {
                    if (localPlayer.vx > 0) localPlayer.x = plat.x - localPlayer.width; 
                    else if (localPlayer.vx < 0) localPlayer.x = plat.x + plat.width; 
                    localPlayer.vx = 0;
                }
            });

            // === VẬT LÝ TRỤC Y ===
            localPlayer.y += localPlayer.vy;
            localPlayer.ground = false;

            gameState.platforms.forEach(plat => {
                if (checkAABB(localPlayer, plat)) {
                    if (localPlayer.vy > 0) { 
                        localPlayer.y = plat.y - localPlayer.height;
                        localPlayer.vy = 0;
                        localPlayer.ground = true;
                    } else if (localPlayer.vy < 0) { 
                        localPlayer.y = plat.y + plat.height;
                        localPlayer.vy = 0;
                    }
                }
            });

            // GIAO TIẾP ĐƯỢC GIỚI HẠN THỜI GIAN ĐỂ CHẶN LAG ĐƯỜNG TRUYỀN MẠNG
            let now = Date.now();
            if (now - lastEmitTime > 35) {
                socket.emit('playerMovement', { x: localPlayer.x, y: localPlayer.y, facing: localPlayer.facing });
                lastEmitTime = now;
            }

            // KIỂM TRA CHẾT
            let dead = false;
            gameState.spikes.forEach(s => { if (checkAABB(localPlayer, s)) dead = true; });
            gameState.lava.forEach(l => { if (checkAABB(localPlayer, l)) dead = true; });
            gameState.enemies.forEach(e => { if (checkAABB(localPlayer, e)) dead = true; });
            gameState.sawblades.forEach(saw => {
                let dist = Math.hypot(localPlayer.x + 16 - saw.x, localPlayer.y + 20 - saw.y);
                if (dist < saw.radius + 10) dead = true;
            });
            if (localPlayer.y > 1500) dead = true; 
            if (dead) { socket.emit('teamDied'); return; }

            // LỤM CHÌA KHÓA CHỐT KHÓA TẠI CLIENT TRƯỚC ĐỂ TRÁNH TRÙNG LẶP GÓI TIN CHẠM VÀO NHAU
            let keyRect = { x: gameState.key?.x, y: gameState.key?.y, width: 30, height: 30 };
            if (gameState.key && !gameState.key.collected && checkAABB(localPlayer, keyRect)) {
                gameState.key.collected = true; 
                socket.emit('updateGameState', { levelIndex: gameState.levelIndex, key: { ...gameState.key, collected: true } });
            }

            // CHẠM CỬA THẮNG (SẼ ĐƯỢC SERVER GIỮ LẠI TRÌ HOÃN CHUYỂN MÀN CHƠI)
            if (gameState.key && gameState.key.collected && gameState.door && !gameState.door.win) {
                let doorRect = { x: gameState.door.x, y: gameState.door.y, width: 60, height: 80 };
                if (checkAABB(localPlayer, doorRect)) {
                    gameState.door.win = true;
                    socket.emit('updateGameState', { levelIndex: gameState.levelIndex, door: { ...gameState.door, win: true } });
                }
            }
        }

        function drawAmongUs(p, color) {
            let w = p.width || 32; let h = p.height || 40; 
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.roundRect(p.x, p.y, w, h, 12); ctx.fill(); 
            ctx.fillStyle = color;
            if (p.facing === 'right') { ctx.beginPath(); ctx.roundRect(p.x - 8, p.y + 10, 10, 20, 5); ctx.fill(); } 
            else { ctx.beginPath(); ctx.roundRect(p.x + w - 2, p.y + 10, 10, 20, 5); ctx.fill(); }
            ctx.fillStyle = '#a4b0be';
            let visorX = p.facing === 'right' ? p.x + 12 : p.x - 4;
            ctx.beginPath(); ctx.roundRect(visorX, p.y + 6, 24, 14, 7); ctx.fill();
            ctx.fillStyle = '#dfe4ea';
            let highlightX = p.facing === 'right' ? p.x + 24 : p.x - 2;
            ctx.beginPath(); ctx.roundRect(highlightX, p.y + 8, 8, 6, 3); ctx.fill();
        }

        function drawBlock(plat) {
            if (plat.type === 'invisible') return;
            ctx.fillStyle = '#2ed573'; 
            if (plat.type === 'ice') ctx.fillStyle = '#70a1ff';
            if (plat.type === 'honey') ctx.fillStyle = '#ffa502';
            if (plat.type === 'bounce') ctx.fillStyle = '#ff4757'; 
            
            if (plat.type === 'conveyorRight' || plat.type === 'conveyorLeft') {
                ctx.fillStyle = '#576574'; ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
                ctx.fillStyle = '#feca57'; ctx.font = '20px Arial';
                let symbol = plat.type === 'conveyorRight' ? '>>' : '<<';
                for(let i = 10; i < plat.width - 20; i+= 50) {
                    ctx.fillText(symbol, plat.x + i + (Date.now()/50 % 10), plat.y + 35);
                }
                return;
            }
            ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
            ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 2;
            ctx.strokeRect(plat.x, plat.y, plat.width, plat.height);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(-cameraX, -cameraY);

            // VẼ VÙNG KHÔNG TRỌNG LỰC 🌌 (BẢO ĐẢM HIỆU ỨNG ĐẸP, KHÔNG LAG)
            if (gameState.zeroGravity) {
                gameState.zeroGravity.forEach(zg => {
                    ctx.fillStyle = 'rgba(155, 89, 182, 0.15)';
                    ctx.fillRect(zg.x, zg.y, zg.width, zg.height);
                    ctx.strokeStyle = 'rgba(155, 89, 182, 0.4)'; ctx.lineWidth = 2; ctx.strokeRect(zg.x, zg.y, zg.width, zg.height);
                    ctx.fillStyle = '#9b59b6'; ctx.font = '16px Arial'; ctx.fillText('🌌 ZERO-G', zg.x + 10, zg.y + 25);
                });
            }

            ctx.fillStyle = 'rgba(52, 152, 219, 0.5)';
            gameState.water.forEach(w => ctx.fillRect(w.x, w.y, w.width, w.height));

            gameState.platforms.forEach(plat => drawBlock(plat));

            ctx.fillStyle = '#7f8fa6';
            gameState.spikes.forEach(s => {
                for (let i = 0; i < s.width; i += 20) {
                    ctx.beginPath(); ctx.moveTo(s.x + i, s.y + s.height); ctx.lineTo(s.x + i + 10, s.y); ctx.lineTo(s.x + i + 20, s.y + s.height); ctx.fill();
                }
            });

            ctx.fillStyle = '#ff6b81';
            gameState.lava.forEach(l => {
                ctx.fillRect(l.x, l.y, l.width, l.height);
            });

            gameState.sawblades.forEach(saw => {
                ctx.save(); ctx.translate(saw.x, saw.y); ctx.rotate(Date.now() / 50); 
                ctx.fillStyle = '#bdc3c7'; ctx.beginPath(); ctx.arc(0, 0, saw.radius, 0, Math.PI * 2); ctx.fill(); ctx.restore();
            });

            if (gameState.door) {
                ctx.fillStyle = gameState.door.win ? '#2ecc71' : ((gameState.key && gameState.key.collected) ? '#f1c40f' : '#a4b0be');
                ctx.fillRect(gameState.door.x, gameState.door.y, 60, 80);
            }

            if (gameState.key && !gameState.key.collected) { ctx.font = '30px Arial'; ctx.fillText('🗝️', gameState.key.x, gameState.key.y + 25); }

            if (localPlayer.color) drawAmongUs(localPlayer, localPlayer.color);
            Object.keys(otherPlayers).forEach(id => drawAmongUs(otherPlayers[id], otherPlayers[id].color));

            ctx.restore();

            if (gameState.gameFinished) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#f1c40f'; ctx.font = 'bold 50px Arial'; ctx.textAlign = 'center';
                ctx.fillText("CHÚC MỪNG BẠN ĐÃ PHÁ ĐẢO 10 MÀN! 🎉", canvas.width/2, canvas.height/2);
            }
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
        gameLoop();
    </script>
</body>
</html>
